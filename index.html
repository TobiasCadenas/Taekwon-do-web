<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <header class="navbar">
    <div class="logo-container">
        <div class="logo-icon">
            <span class="hanja">跆</span>
        </div>
        <h1 class="site-title">Historia del Taekwon-do</h1>
    </div>

    <nav class="nav-links">
        <a href="#" class="nav-item active">Inicio</a>
        <a href="#" class="nav-item">Historia Antigua</a>
        <a href="#" class="nav-item">Fundación Moderna</a>
        <a href="#" class="nav-item">Evolución</a>
        <a href="#" class="nav-item">Sistema de Cinturones</a>
        <a href="#" class="nav-item">Filosofía</a>
    </nav>
</header>
<main>
    <section class="section">

        <h2>Historia del Taekwon-do</h2>
        <p>Un arte a travez de la historia </p>
        <div class="section__buttons">
            <a class="button1" href="">Explora Historia</a>
            <a class="button2" href="">Filosofia</a>
        </div>
    </section>
    <section class="stats-section">
    
    <div class="stat-item">
        <div class="stat-icon">
            <!-- Ícono calendario (SVG) -->
            <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="#e10600" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
        </div>
        <h2 class="stat-number">1955</h2>
        <p class="stat-text">Año de Fundación</p>
    </div>

    <div class="stat-item">
        <div class="stat-icon">
            <!-- Ícono globo -->
            <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="#e10600" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="2" y1="12" x2="22" y2="12"></line>
                <path d="M12 2a15.3 15.3 0 0 1 0 20"></path>
                <path d="M12 2a15.3 15.3 0 0 0 0 20"></path>
            </svg>
        </div>
        <h2 class="stat-number">200+</h2>
        <p class="stat-text">Países</p>
    </div>

    <div class="stat-item">
        <div class="stat-icon">
            <!-- Ícono personas -->
            <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="#e10600" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="9" cy="7" r="4"></circle>
                <path d="M17 11a4 4 0 1 0-8 0"></path>
                <path d="M5.5 21a6.5 6.5 0 0 1 13 0"></path>
            </svg>
        </div>
        <h2 class="stat-number">80M+</h2>
        <p class="stat-text">Practicantes</p>
    </div>

</section>
</main>
<footer></footer>
</body>
</html>
